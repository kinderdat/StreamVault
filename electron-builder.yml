appId: io.streamvault.desktop
productName: StreamVault
copyright: StreamVault

directories:
  buildResources: resources
  output: dist

files:
  - out/**/*
  - package.json
  - node_modules/**/*

extraResources:
  - from: resources/bin/
    to: bin/
    filter:
      - "yt-dlp.exe"
      - "ffmpeg.exe"
      - "ffprobe.exe"
win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: StreamVault

asarUnpack:
  - node_modules/better-sqlite3/**/*

npmRebuild: true
